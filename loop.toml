# Loop Engineering 計測配管の設定
# 実行系はネイティブ(claude -p / git worktree)。ここは計測の境界条件だけを宣言する。

[loop]
# headless 実行に使うモデル(エイリアス可)。タスク側で上書きできる。
model = "claude-sonnet-4-6"

# 停止条件は3段で持つ。turn 上限が暴走ループの一次ガード。
# --max-budget-usd の支出は 2026/6/15 以降 Agent SDK クレジットから引かれるため、
# サブスク型ランナーのセッション枯渇は budget では守れない。turn + wall-clock の併用に意味がある。
max_turns = 40
max_budget_usd = 2.0
timeout_seconds = 1800

# リトライ(人間送り=handoff を極力減らす)。
# verifier_attempts: Verifier が判定不能(handoff)のとき read-only のまま再判定する回数。冪等で安全。
# max_attempts: 実装が timeout/error で確定しなかったとき run 全体を再試行する上限(冪等タスク前提)。
#   決定済みの pass/fail は再試行しない。非冪等タスクは TODO 側に max_attempts: 1 を指定する。
verifier_attempts = 3
max_attempts = 2

# Verifier が revise(差し戻し)判定したとき、Implementer を --resume(前文脈保持)で再実装させる往復回数の上限。
# 0 で差し戻し無効(従来挙動)。上限超過でも pass にせず handoff(検証の死角を作らない)。
implementer_revise_rounds = 2

# promote: run=pass の成果を PR 化し、GitHub CI + Copilot レビューが green になるまで
# Implementer を --resume で差し戻して回す(種類A)。merge は人間(自動 merge しない)。
# 既定 false(安全)。有効化すると pass のたびに実 PR を作る外向き動作になる。
promote_on_pass = false
promote_rounds = 3            # CI/Copilot 差し戻しの往復上限。超過は green にせず handoff
ci_timeout_seconds = 1800     # CI チェック完了待ちのタイムアウト
copilot_timeout_seconds = 600 # Copilot レビュー投稿待ちのタイムアウト

# 過去 run の客観的事実(同一 repo で通った検証コマンド・直近 verdict・失敗事実)を
# Author/Implementer/Verifier に渡す件数。0 で無効。人間の判断(学び/review-notes)は渡さない(メタループ用)。
repo_history_runs = 8

# 規範記憶(手続き的記憶)。事実ブリーフとは別系統で、repo の設計・振る舞いの規範を扱う。
# norms_enabled: 承認済み規範(repo/<name>/conventions.md)を run 開始時に注入するか(種類A)。
#   優先順位は CLAUDE.md(憲法) > conventions.md > 過去 run の事実ブリーフ。候補(candidates.md)は注入しない。
# norms_draft_on_friction: 摩擦のある run(revise 差し戻し / Verifier handoff)で規範候補を自動起草するか(種類A)。
#   起草はあくまで「候補」止まり。conventions.md への昇格は人間の手作業(種類B / runner.py norms)。
norms_enabled = true
norms_draft_on_friction = true

# タスクが allowed_tools を指定しなかった場合のフォールバック。
# -p モードでは未許可ツールは(尋ねられず)拒否されるため、コード探索の Grep/Glob も入れておく。
default_allowed_tools = ["Read", "Edit", "Write", "Grep", "Glob", "Bash"]

# permission-mode。default だと未認可ツールはブロックされる(承認する人間がいないため)。
permission_mode = "default"

# 同時に走らせる run の本数の上限。デフォルト 1 = 従来の単一直列(.run.lock)と完全等価。
# 1 を超えると runner は in-process ワーカープールで todo を N 本同時に claim・実行する。
# 上げると claude -p の同時セッション数・総予算が比例して増えるため、明示宣言した分だけ並列化する。
max_concurrency = 1

[agents]
# Sub-agents。Verifier は Implementer と必ず別モデルにすること(記事の Sub-agents の肝)。
# 書いた本人は自分に高得点をつけるため、独立した別モデルが受け入れ基準を再判定する。
# Author が生成時に repo を調査し詳細プランまで書く(旧 Explorer を統合)。run 時の Explorer は廃止。
implementer_model = "claude-sonnet-4-6"           # 主力(従来の maker)。差し戻し時は --resume で継続
verifier_model    = "claude-opus-4-8"             # 別モデル必須(implementer と異なること)
author_model      = "claude-sonnet-4-6"           # 自然言語→目標契約+実装プランの生成

# 役割ごとの allowed_tools。Verifier は read-only を厳守(判定者は直さない)。
implementer_tools = ["Read", "Edit", "Write", "Bash", "Grep", "Glob"]  # task 側で上書き可
verifier_tools    = ["Read", "Grep", "Glob"]

# リポジトリ構成([repo] デフォルト対象 / [repos] レジストリ)は **このファイルに置かない**。
# マシン固有なので gitignore された loop.local.toml に書く(load_config がマージ)。
# loop.local.toml.example を参照。未指定時、対象 repo は "."(この loop ディレクトリ)にフォールバックする。

[data]
# 契約データ(TODO.md / runs/ / review-notes.md / loop.db)の置き場。
# エンジン(公開 repo)とは別の private git repo にする。エンジン側は data/ を .gitignore する。
dir = "data"
