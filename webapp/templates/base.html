<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}loop{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    :root { color-scheme: dark; }
    *, *::before, *::after { box-sizing: border-box; }
    body { font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, monospace;
           margin: 0; padding: 1.2rem 1.6rem; background:#16181d; color:#d7dae0;
           overflow-x: hidden; }
    a { color:#7aa2f7; text-decoration:none; } a:hover { text-decoration:underline; }
    h1,h2,h3 { color:#c0caf5; } h1 { font-size:1.1rem; }
    table { border-collapse: collapse; width:100%; }
    th,td { text-align:left; padding:.35rem .6rem; border-bottom:1px solid #2a2e37; white-space:nowrap; }
    th { color:#9aa5ce; font-weight:600; }
    tr:hover td { background:#1c1f26; }
    .pass{color:#9ece6a;} .fail{color:#f7768e;} .timeout{color:#e0af68;} .handoff{color:#7dcfff;}
    .pill{padding:0 .4rem;border-radius:.3rem;background:#2a2e37;}
    /* repo バッジ: task 名と同等以上に目立たせる重要情報 */
    .repo-badge{display:inline-block;padding:.05rem .55rem;border-radius:.35rem;font-weight:700;
      background:#243b53;color:#9ec1ff;border:1px solid #36567a;white-space:nowrap;}
    .repo-badge::before{content:"▣ ";opacity:.7;}
    .repo-badge.norepo{background:#3a2f1a;color:#e0af68;border-color:#5a4a2a;}
    .repo-badge.norepo::before{content:"⌂ ";}
    h2 .repo-badge{font-size:1rem;vertical-align:middle;}
    /* 監視: フェーズ進行 */
    .phases{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;margin-top:.3rem;}
    .phase{padding:.1rem .5rem;border-radius:.3rem;border:1px solid #2a2e37;}
    .phase.done{color:#9ece6a;border-color:#2f4a2a;}
    .phase.cur{color:#e0af68;border-color:#5a4a2a;background:#2a2418;font-weight:700;}
    .phase.todo{color:#6b7280;}
    .arrow{color:#3a3f4b;}
    form.filter { margin:.6rem 0 1rem; display:flex; gap:.5rem; flex-wrap:wrap; align-items:center; }
    input,select,textarea,button { font:inherit; background:#1c1f26; color:#d7dae0;
           border:1px solid #2a2e37; border-radius:.3rem; padding:.3rem .5rem; }
    button { cursor:pointer; background:#28304a; }
    textarea { width:100%; min-height:3.2rem; resize:vertical; }
    pre { background:#0f1115; padding:.7rem; border-radius:.4rem; overflow:auto; max-height:28rem; }
    .diff .add{color:#9ece6a;} .diff .del{color:#f7768e;} .diff .hd{color:#7aa2f7;}
    /* minmax(0,1fr) で各カラムが 0 まで縮められるようにする。1fr のままだと
       中の <pre> の長い行がカラムを押し広げ、右のレビューUIが画面外に追い出される。 */
    .grid { display:grid; grid-template-columns: minmax(0,1fr) minmax(0,1fr); gap:1.4rem; align-items:start; }
    .grid > div { min-width: 0; }
    /* 判断ペイン: 画面の縦いっぱいを使い、テキストエリアで残り高さを分配 */
    .review-pane { position:sticky; top:1rem; height:calc(100vh - 5rem);
                   display:flex; flex-direction:column; min-height:0; }
    .review-pane h3 { margin:.1rem 0 .5rem; }
    .judgment-form { flex:1; display:flex; flex-direction:column; min-height:0; min-width:0; }
    .judgment-form fieldset { flex:1; display:flex; flex-direction:column;
                              gap:.1rem; min-height:0; min-width:0; overflow-y:auto; overflow-x:hidden; }
    .judgment-form label { margin:.45rem 0 .15rem; }
    .judgment-form textarea { flex:1 1 0; min-height:3rem; width:100%; max-width:100%; resize:none; }
    .judgment-form textarea.grow2 { flex:2.2 1 0; }
    .judgment-form .actions { padding-top:.5rem; }
    /* タスク編集フォーム */
    .task-form { max-width: 60rem; }
    .task-form input, .task-form textarea, .task-form select { width: 100%; }
    .task-form textarea { resize: vertical; }
    .task-form .row { display:flex; gap:1rem; flex-wrap:wrap; }
    .task-form .row > div { flex:1; min-width:12rem; }
    .task-form .actions { margin-top:1rem; }
    .rows { margin:.2rem 0 .3rem; }
    .rowitem { display:flex; gap:.4rem; margin-bottom:.3rem; }
    .rowitem input { flex:1; }
    .del { width:2.4rem; flex:none; }
    .addrow { background:#1c1f26; }
    .actions-cell { display:flex; gap:.4rem; }
    .actions-cell form { margin:0; }
    label.check { display:flex; align-items:center; gap:.5rem; margin:.7rem 0; color:#d7dae0; }
    label.check input { width:auto; }
    .muted{color:#6b7280;} fieldset{border:1px solid #2a2e37;border-radius:.4rem;margin:.4rem 0;}
    label{display:block;color:#9aa5ce;margin:.5rem 0 .2rem;}
    dl{display:grid;grid-template-columns:max-content 1fr;gap:.1rem .8rem;margin:0;}
    dt{color:#9aa5ce;} dd{margin:0;}
    /* transcript の吹き出し */
    .msg{border-radius:.5rem;padding:.5rem .8rem;margin:.6rem 0;border:1px solid #2a2e37;}
    .msg .who{font-size:.8rem;color:#9aa5ce;margin-bottom:.3rem;display:flex;justify-content:space-between;}
    .msg .body{white-space:pre-wrap;word-break:break-word;}
    .msg pre{margin:.2rem 0 0;max-height:22rem;}
    .m-user{border-left:3px solid #7aa2f7;background:#171b24;}
    .m-assistant{border-left:3px solid #9ece6a;background:#161d18;}
    .m-think{border-left:3px solid #565f89;background:#15171d;color:#8b93b3;}
    .m-tool{border-left:3px solid #bb9af7;background:#1a1722;}
    .m-result{border-left:3px solid #565f89;background:#13151a;}
    .m-think .who,.m-tool .who{color:#bb9af7;}
    details>summary{cursor:pointer;color:#9aa5ce;}
  </style>
</head>
<body>
  <h1><a href="{{ base }}/">loop</a> — Loop Engineering 計測配管 <span class="muted">·</span> <a href="{{ base }}/todo">TODO</a> <span class="muted">·</span> <a href="{{ base }}/monitor">監視</a></h1>
  {% block body %}{% endblock %}
</body>
</html>
